<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voice Pay - PayFlow</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="app">
    <header>
      <a href="index.html" class="back">←</a>
      <div class="logo">Voice Input</div>
    </header>

    <section class="section center">
      <p class="hint">Upload an audio file and we'll parse the payment details for you.</p>

      <label class="file-label" for="audioFile">
        <span id="fileLabel">📎 Choose audio file</span>
        <input type="file" id="audioFile" accept="audio/*" onchange="updateLabel(this)" />
      </label>

      <button class="btn-primary" onclick="upload()">Parse Voice</button>

      <div id="result" class="result-box hidden"></div>

      <div id="parsed" class="parsed-box hidden">
        <h3>Parsed Result</h3>
        <pre id="parsedText"></pre>
      </div>
    </section>
  </div>

  <script>
    const API = 'http://localhost:8000';

    function updateLabel(input) {
      document.getElementById('fileLabel').textContent = input.files[0]?.name || '📎 Choose audio file';
    }

    async function upload() {
      const file = document.getElementById('audioFile').files[0];
      if (!file) return alert('Please select an audio file');

      const btn = document.querySelector('.btn-primary');
      btn.textContent = 'Uploading...';
      btn.disabled = true;

      const form = new FormData();
      form.append('file', file);

      try {
        const res = await fetch(`${API}/voice-input`, { method: 'POST', body: form });
        const data = await res.json();

        const box = document.getElementById('result');
        box.className = 'result-box success';
        box.classList.remove('hidden');
        box.innerHTML = `🎤 Transcribed: <em>"${data.text}"</em>`;

        if (data.parsed) {
          document.getElementById('parsed').classList.remove('hidden');
          document.getElementById('parsedText').textContent = JSON.stringify(data.parsed, null, 2);
        }
      } catch (e) {
        const box = document.getElementById('result');
        box.className = 'result-box error';
        box.classList.remove('hidden');
        box.textContent = '❌ Could not process audio.';
      } finally {
        btn.textContent = 'Parse Voice';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
